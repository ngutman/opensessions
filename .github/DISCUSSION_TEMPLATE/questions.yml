title: "[Q&A] "
labels: []
body:
  - type: markdown
    attributes:
      value: |
        Ask anything about opensessions — setup, configuration, agent integration, or how something works.

  - type: textarea
    id: question
    attributes:
      label: Your question
      description: What do you need help with?
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: "Relevant details: OS, tmux version, agents you're running, what you've tried so far."
    validations:
      required: false
