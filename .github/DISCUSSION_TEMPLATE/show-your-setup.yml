title: "[Setup] "
labels: []
body:
  - type: markdown
    attributes:
      value: |
        Share how you use opensessions! This helps us understand real workflows and prioritize features.

  - type: input
    id: agents
    attributes:
      label: What AI agents do you use?
      description: e.g., Amp, Claude Code, OpenCode, Codex, Aider
      placeholder: "Amp, Claude Code"
    validations:
      required: true

  - type: input
    id: session-count
    attributes:
      label: How many tmux sessions do you typically run?
      placeholder: "6-10"
    validations:
      required: false

  - type: dropdown
    id: usage-frequency
    attributes:
      label: How often do you use opensessions?
      options:
        - Daily
        - A few times a week
        - Weekly
        - Just trying it out
    validations:
      required: true

  - type: textarea
    id: workflow
    attributes:
      label: Describe your workflow
      description: How does opensessions fit into your day? What problem does it solve for you?
      placeholder: "I run 8 sessions with different repos, use the sidebar to jump between them..."
    validations:
      required: true

  - type: textarea
    id: favorite-feature
    attributes:
      label: Favorite feature / biggest pain point
      description: What do you love? What's frustrating?
    validations:
      required: false

  - type: textarea
    id: screenshot
    attributes:
      label: Screenshot of your setup (optional)
      description: Drag and drop a screenshot of your tmux + opensessions layout
    validations:
      required: false
