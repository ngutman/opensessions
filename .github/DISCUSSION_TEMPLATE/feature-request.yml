title: "[Feature] "
labels: []
body:
  - type: markdown
    attributes:
      value: |
        Got an idea for opensessions? We'd love to hear it.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the workflow or pain point that led to this idea.
      placeholder: "When I have 10+ sessions open, I can't quickly find..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How do you think this could work?
    validations:
      required: true

  - type: dropdown
    id: scope
    attributes:
      label: Which area does this touch?
      options:
        - TUI / sidebar
        - Agent watchers
        - Session management
        - Mux integration (tmux/zellij)
        - Configuration
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Any workarounds you're using today?
    validations:
      required: false
